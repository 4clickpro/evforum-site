<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} | EV Forum</title>
    <meta name="description" content="{{ .Params.meta_description }}">
    <style>
        :root {
            --primary: #0a192f;
            --accent: #38bdf8;
            --accent-hover: #0284c7;
            --bg: #f0fdfa;
            --card-bg: #ffffff;
            --text: #334155;
            --text-light: #64748b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: var(--bg); color: var(--text); line-height: 1.8; }
        header { background-color: var(--primary); color: white; padding: 1.5rem 0; border-bottom: 4px solid var(--accent); }
        .header-content { max-width: 1200px; margin: 0 auto; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 2rem; font-weight: 900; text-decoration: none; color: white; letter-spacing: -1px; }
        .logo span { color: var(--accent); }
        .container { max-width: 800px; margin: 4rem auto; padding: 2rem; background: var(--card-bg); border-radius: 12px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); margin-bottom: 1rem; font-size: 2.2rem; line-height: 1.2; }
        .content img { max-width: 100%; height: auto; border-radius: 8px; margin: 2rem 0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .content h2 { color: var(--primary); margin-top: 2rem; margin-bottom: 1rem; }
        .content p { margin-bottom: 1.5rem; font-size: 1.1rem; }
        .back-link { display: inline-block; margin-bottom: 2rem; font-weight: bold; color: var(--text-light); text-decoration: none; }
        .back-link:hover { color: var(--accent); }
        footer { background-color: var(--primary); color: #94a3b8; text-align: center; padding: 3rem 2rem; margin-top: 4rem; }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <a href="/" class="logo">EV<span>Forum</span>.net</a>
        </div>
    </header>
    <main class="container">
        <a href="/" class="back-link">← Back to Community</a>
        <article>
            <h1>{{ .Title }}</h1>
            <div style="color: var(--text-light); margin-bottom: 2rem;">Published by {{ .Params.author }}</div>
            <div class="content">
                {{ .Content | safeHTML }}
            </div>
        </article>
    </main>
    <footer>
        <p>&copy; 2026 EV Forum. All rights reserved.</p>
    </footer>
</body>
</html>
